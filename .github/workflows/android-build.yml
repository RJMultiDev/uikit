name: Android Library CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build AAR
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: |
          chmod +x ./gradlew || true
          ls -la gradle/wrapper || true

      - name: Build uikit library
        run: ./gradlew :uikit:assembleRelease --no-daemon

      - name: Publish unit test report
        if: always()
        run: ./gradlew :uikit:test --no-daemon || true

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: uikit-aar
          path: uikit/build/outputs/aar/*.aar
          if-no-files-found: error
          retention-days: 14
